header:
  title: Mental models, not API dumps.
  description: Each page transfers the mental model of one RAGFlow subsystem — what it is for, the design decisions behind it, and how it relates to its neighbors.

items:
  - col: col-5
    icon: bento/rocket_launch
    title: Get up to speed without reading a thousand files
    description: The guide covers the engine's spine — dataset to chunks to cited answers, plus the agent layer on top — so you can hold the whole architecture in your head before opening a file.
    badges: [ ]

  - col: col-7
    icon: bento/extension
    title: Grounded in the source
    description: Every claim cites real files and symbols from the RAGFlow repository, and every page ends with a "Where to look in the code" map. Nothing here is folklore — it was read out of the code.
    badges: [ Ingestion, Retrieval, GraphRAG, Agents ]

  - col: col-7
    icon: bento/shield
    title: Complements the official docs
    description: ragflow.io owns quickstarts, UI guides, and component and API reference. This guide covers what those docs have not explained — the task-executor pipeline, the embedding layer, the canvas orchestrator, the doc-engine abstraction, and more.
    badges: [ ]
